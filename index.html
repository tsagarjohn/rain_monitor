<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain Monitor – IORTHO1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f1a; --panel:#111827; --border:#1e2d45;
    --accent:#38bdf8; --accent2:#0ea5e9; --rain:#7dd3fc;
    --dry:#34d399; --warn:#fbbf24; --text:#e2e8f0;
    --muted:#64748b; --error:#f87171;
    --accent-seb:#a78bfa;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Mono',monospace;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:24px;
    position:relative; overflow-x:hidden;
  }
  .rain-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .drop {
    position:absolute; width:1px;
    background:linear-gradient(to bottom, transparent, rgba(56,189,248,0.15));
    animation:fall linear infinite; top:-100px;
  }
  @keyframes fall { to { transform:translateY(110vh); opacity:0; } }
  .container { position:relative; z-index:1; width:100%; max-width:480px; }
  header { margin-bottom:32px; text-align:center; }
  .station-label { font-family:'Syne',sans-serif; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
  h1 { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; color:var(--text); line-height:1; }
  h1 span { color:var(--accent); }
  .subtitle { margin-top:8px; font-size:11px; color:var(--muted); letter-spacing:1px; }

  .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:16px; }
  .card.seb-card { border-color:#2d1e45; }

  .section-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .section-badge { font-family:'Syne',sans-serif; font-size:9px; letter-spacing:3px; text-transform:uppercase; padding:3px 10px; border-radius:20px; }
  .section-badge.pws { background:rgba(56,189,248,0.1); color:var(--accent); border:1px solid var(--accent); }
  .section-badge.seb { background:rgba(167,139,250,0.1); color:var(--accent-seb); border:1px solid var(--accent-seb); }

  .status-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .status-dot { width:10px; height:10px; border-radius:50%; background:var(--muted); display:inline-block; margin-right:8px; transition:background 0.4s; }
  .status-dot.online { background:var(--dry); box-shadow:0 0 8px var(--dry); animation:pulse-dot 2s infinite; }
  .status-dot.rain   { background:var(--rain); box-shadow:0 0 8px var(--rain); animation:pulse-dot 1s infinite; }
  .status-dot.error  { background:var(--error); }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-size:12px; color:var(--muted); }
  .next-check  { font-size:11px; color:var(--muted); text-align:right; }

  .precip-display { text-align:center; padding:24px 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .precip-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .precip-value { font-family:'Syne',sans-serif; font-size:64px; font-weight:800; color:var(--text); line-height:1; transition:color 0.5s; }
  .precip-value.raining { color:var(--rain); }
  .precip-value.dry     { color:var(--dry); }
  .precip-unit { font-size:14px; color:var(--muted); margin-top:4px; }

  .weather-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .weather-item { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .weather-item-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .weather-item-value { font-size:18px; font-weight:500; color:var(--text); }

  /* Sebronas compact grid */
  .seb-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
  .seb-item { background:rgba(167,139,250,0.04); border:1px solid #2d1e45; border-radius:10px; padding:10px 12px; }
  .seb-item-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .seb-item-value { font-size:16px; font-weight:500; color:var(--text); }
  .seb-item-value.raining { color:var(--rain); }

  .seb-time { font-size:10px; color:var(--muted); margin-bottom:14px; }
  .seb-time span { color:var(--accent-seb); }

  .seb-precip-row { display:flex; align-items:center; justify-content:center; gap:6px; padding:14px 0 16px; border-bottom:1px solid #2d1e45; margin-bottom:16px; text-align:center; }
  .seb-precip-big { font-family:'Syne',sans-serif; font-size:48px; font-weight:800; color:var(--dry); transition:color 0.5s; line-height:1; }
  .seb-precip-big.raining { color:var(--rain); }
  .seb-precip-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .seb-precip-unit { font-size:12px; color:var(--muted); }

  .controls { display:flex; gap:10px; }
  button { flex:1; padding:14px; border-radius:10px; border:none; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:1px; cursor:pointer; transition:all 0.2s; }
  .btn-primary   { background:var(--accent); color:#0a0f1a; font-weight:500; }
  .btn-primary:hover { background:var(--accent2); transform:translateY(-1px); }
  .btn-secondary { background:transparent; border:1px solid var(--border) !important; color:var(--muted); }
  .btn-secondary:hover { border-color:var(--accent) !important; color:var(--accent); }

  .error-msg { font-size:11px; color:var(--error); text-align:center; margin-top:8px; display:none; }
  .error-msg.show { display:block; }
</style>
</head>
<body>

<div class="rain-bg" id="rainBg"></div>

<div class="container">
  <header>
    <div class="station-label">Rain Monitor</div>
    <h1>IORTHO<span>1</span></h1>
    <div class="subtitle">Pateles · Orthounio, GR · 485m</div>
  </header>

  <!-- ── PWS IORTHO1 ── -->
  <div class="card">
    <div class="section-header">
      <span class="section-badge pws">My PWS · IORTHO1</span>
    </div>
    <div class="status-row">
      <div>
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Waiting to start...</span>
      </div>
      <div class="next-check" id="nextCheck"></div>
    </div>

    <!-- Precip Today — big, on top -->
    <div class="precip-display">
      <div class="precip-label">Precip Today</div>
      <div class="precip-value" id="accumVal">--</div>
      <div class="precip-unit">mm</div>
    </div>

    <!-- Precip Rate — below -->
    <div class="precip-display" style="padding-top:16px;">
      <div class="precip-label">Precip Rate</div>
      <div class="precip-value" style="font-size:44px;" id="precipValue">--</div>
      <div class="precip-unit">mm / hr</div>
    </div>

    <div class="weather-grid">
      <div class="weather-item">
        <div class="weather-item-label">Temperature</div>
        <div class="weather-item-value" id="tempVal">--</div>
      </div>
      <div class="weather-item">
        <div class="weather-item-label">Humidity</div>
        <div class="weather-item-value" id="humidVal">--</div>
      </div>
      <div class="weather-item">
        <div class="weather-item-label">Wind</div>
        <div class="weather-item-value" id="windVal">--</div>
        <div style="font-size:9px;color:var(--muted);margin-top:3px;" id="windDesc">--</div>
      </div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- ── SEBRONAS ── -->
  <div class="card seb-card">
    <div class="section-header">
      <span class="section-badge seb">Sebronas · meteo.gr · 640m</span>
    </div>

    <div class="seb-time">Last reading: <span id="sebTime">--</span></div>

    <div class="seb-precip-row">
      <div>
        <div class="seb-precip-label">Rain Today</div>
        <div class="seb-precip-big" id="sebRain">--</div>
        <div class="seb-precip-unit">mm</div>
      </div>
    </div>

    <div class="seb-grid">
      <div class="seb-item">
        <div class="seb-item-label">Temperature</div>
        <div class="seb-item-value" id="sebTemp">--</div>
      </div>
      <div class="seb-item">
        <div class="seb-item-label">Humidity</div>
        <div class="seb-item-value" id="sebHumid">--</div>
      </div>
      <div class="seb-item">
        <div class="seb-item-label">Wind</div>
        <div class="seb-item-value" id="sebWind">--</div>
        <div style="font-size:9px;color:var(--muted);margin-top:3px;" id="sebWindDesc">--</div>
      </div>
      <div class="seb-item">
        <div class="seb-item-label">Pressure</div>
        <div class="seb-item-value" id="sebPressure">--</div>
      </div>
    </div>

    <div class="error-msg" id="sebErrorMsg" style="margin-top:8px;"></div>
  </div>

  <div class="controls">
    <button class="btn-primary" id="startBtn" onclick="toggleMonitor()">▶ Start Monitoring</button>
    <button class="btn-secondary" onclick="checkNow()">Check Now</button>
  </div>


</div>

<script>
  // ── Config ──
  var API_KEY       = '96a7fe833f0c4f7fa7fe833f0cff7f97';
  var STATION_ID    = 'IORTHO1';
  var CHECK_INTERVAL = 5 * 60 * 1000;

  var PROXIES = [
    function(u){ return 'https://corsproxy.io/?url=' + encodeURIComponent(u); },
    function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
    function(u){ return 'https://thingproxy.freeboard.io/fetch/' + u; }
  ];

  var PWS_URL = 'https://api.weather.com/v2/pws/observations/current?stationId=' + STATION_ID + '&format=json&units=m&apiKey=' + API_KEY;
  var SEB_URL = 'https://penteli.meteo.gr/stations/sebronas/';

  // ── Rain drops ──
  var rainBg = document.getElementById('rainBg');
  for (var i = 0; i < 40; i++) {
    var d = document.createElement('div');
    d.className = 'drop';
    d.style.left = (Math.random() * 100) + '%';
    d.style.height = (Math.random() * 60 + 40) + 'px';
    d.style.animationDuration = (Math.random() * 1.5 + 0.8) + 's';
    d.style.animationDelay = (Math.random() * 3) + 's';
    d.style.opacity = Math.random() * 0.5 + 0.1;
    rainBg.appendChild(d);
  }

  // ── Helpers ──
  function addLog(msg, isRain) {}  // kept as stub so no errors if called

  function setStatus(type, text) {
    document.getElementById('statusDot').className = 'status-dot ' + type;
    document.getElementById('statusText').textContent = text;
  }

  var monitorInterval = null;
  var countdown = null;
  var secondsLeft = 0;
  var isRunning = false;

  function startCountdown() {
    secondsLeft = CHECK_INTERVAL / 1000;
    clearInterval(countdown);
    countdown = setInterval(function() {
      secondsLeft--;
      var m = Math.floor(secondsLeft / 60);
      var s = secondsLeft % 60;
      document.getElementById('nextCheck').textContent = 'Next: ' + m + ':' + (s < 10 ? '0' : '') + s;
      if (secondsLeft <= 0) clearInterval(countdown);
    }, 1000);
  }

  // ── Beaufort ──
  var BF_SCALE = [
    {max:1,   desc:'Calm'},
    {max:6,   desc:'Light Air'},
    {max:12,  desc:'Light Breeze'},
    {max:20,  desc:'Gentle Breeze'},
    {max:29,  desc:'Moderate Breeze'},
    {max:39,  desc:'Fresh Breeze'},
    {max:50,  desc:'Strong Breeze'},
    {max:62,  desc:'Near Gale'},
    {max:75,  desc:'Gale'},
    {max:89,  desc:'Strong Gale'},
    {max:103, desc:'Storm'},
    {max:118, desc:'Violent Storm'},
    {max:999, desc:'Hurricane'}
  ];

  function toDecimalBf(kmh) {
    var idx = 0;
    for (var i = 0; i < BF_SCALE.length; i++) {
      if (kmh < BF_SCALE[i].max) { idx = i; break; }
      idx = i;
    }
    if (idx === 0) return { bf: 0, desc: BF_SCALE[0].desc };
    var prev = idx > 0 ? BF_SCALE[idx-1].max : 0;
    var curr = BF_SCALE[idx].max;
    var fraction = (kmh - prev) / (curr - prev);
    var bf = Math.min(Math.round((idx + fraction) * 10) / 10, 12);
    return { bf: bf, desc: BF_SCALE[idx].desc };
  }

  // ── Fetch PWS ──
  async function fetchPWS() {
    document.getElementById('errorMsg').classList.remove('show');
    var data = null, lastErr = null;
    for (var i = 0; i < PROXIES.length; i++) {
      try {
        var r = await fetch(PROXIES[i](PWS_URL), { headers: { 'Accept': 'application/json' } });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        data = JSON.parse(await r.text());
        break;
      } catch(e) { lastErr = e; }
    }
    if (!data) {
      setStatus('error', 'PWS check failed');
      document.getElementById('errorMsg').textContent = '⚠ Could not fetch PWS data.';
      document.getElementById('errorMsg').classList.add('show');
      addLog('PWS error: ' + (lastErr ? lastErr.message : 'unknown'), false);
      return;
    }
    try {
      var obs  = data.observations[0];
      var m    = obs.metric || {};
      var precipRate  = parseFloat(m.precipRate)  || 0;
      var precipTotal = parseFloat(m.precipTotal) || 0;
      var temp     = m.temp;
      var humidity = obs.humidity;
      var windSpeed = m.windSpeed;

      var precipEl = document.getElementById('precipValue');
      precipEl.textContent = precipRate.toFixed(1);
      precipEl.className   = 'precip-value ' + (precipRate > 0 ? 'raining' : 'dry');

      document.getElementById('tempVal').textContent   = temp + ' °C';
      document.getElementById('humidVal').textContent  = humidity + ' %';
      document.getElementById('accumVal').textContent  = precipTotal.toFixed(1);
      var bfResult = toDecimalBf(windSpeed);
      document.getElementById('windVal').textContent  = 'BF ' + bfResult.bf.toFixed(1);
      document.getElementById('windDesc').textContent = bfResult.desc + ' · ' + windSpeed + ' km/h';

      var isRaining = precipRate > 0;
      if (isRaining) {
        setStatus('rain', 'Station online · Rain detected!');
      } else {
        setStatus('online', 'Station online · No rain');
      }
    } catch(e) {
      setStatus('error', 'PWS parse error');
    }
  }

  // ── Fetch Sebronas ──
  async function fetchSebronas() {
    var sebErr = document.getElementById('sebErrorMsg');
    sebErr.classList.remove('show');
    var html = null, lastErr = null;

    for (var i = 0; i < PROXIES.length; i++) {
      try {
        var r = await fetch(PROXIES[i](SEB_URL), { headers: { 'Accept': 'text/html' } });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        html = await r.text();
        break;
      } catch(e) { lastErr = e; }
    }

    if (!html) {
      sebErr.textContent = '⚠ Could not fetch Sebronas data.';
      sebErr.classList.add('show');
      addLog('Sebronas error: ' + (lastErr ? lastErr.message : 'unknown'), false);
      return;
    }

    try {
      // Parse values from the HTML page using regex
      function extract(pattern) {
        var m = html.match(pattern);
        return m ? m[1].trim() : '--';
      }

      // Time
      var timeMatch = html.match(/(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})/);
      var sebTime = timeMatch ? timeMatch[1] + ' ' + timeMatch[2] : '--';
      document.getElementById('sebTime').textContent = sebTime;

      // Temperature — first °C value
      var tempM = html.match(/([\d.]+)\s*°C/);
      var sebTemp = tempM ? tempM[1] + ' °C' : '--';
      document.getElementById('sebTemp').textContent = sebTemp;

      // Humidity
      var humM = html.match(/([\d.]+)\s*%/);
      var sebHumid = humM ? humM[1] + ' %' : '--';
      document.getElementById('sebHumid').textContent = sebHumid;

      // Wind — "X.X Km/h at DIR"
      var windM = html.match(/([\d.]+)\s*[Kk]m\/h\s+at\s+([A-Z]+)/);
      if (windM) {
        var sebWindKmh = parseFloat(windM[1]);
        var sebWindDir = windM[2];
        var sebBf = toDecimalBf(sebWindKmh);
        document.getElementById('sebWind').textContent = 'BF ' + sebBf.bf.toFixed(1) + ' · ' + sebWindDir;
        document.getElementById('sebWindDesc').textContent = sebBf.desc + ' · ' + sebWindKmh + ' km/h';
      } else {
        document.getElementById('sebWind').textContent = '--';
        document.getElementById('sebWindDesc').textContent = '--';
      }

      // Barometer
      var pressM = html.match(/([\d.]+)\s*hPa/);
      var sebPressure = pressM ? pressM[1] + ' hPa' : '--';
      document.getElementById('sebPressure').textContent = sebPressure;

      // Rain — look for Rain / mm pattern
      // The page shows daily rain, try several patterns
      var rainM = html.match(/[Rr]ain[^0-9]*([\d.]+)\s*mm/)
               || html.match(/(\d+\.?\d*)\s*mm/);
      var sebRainVal = rainM ? parseFloat(rainM[1]) : 0;
      var sebRainEl = document.getElementById('sebRain');
      sebRainEl.textContent = sebRainVal.toFixed(1);
      sebRainEl.className = 'seb-precip-big' + (sebRainVal > 0 ? ' raining' : '');

    } catch(e) {
      sebErr.textContent = '⚠ Could not parse Sebronas page.';
      sebErr.classList.add('show');
    }
  }

  // ── Combined fetch ──
  async function fetchAll() {
    await fetchPWS();
    await fetchSebronas();
  }

  function sendNotification(rate, total) {
    if (Notification.permission === 'granted') {
      new Notification('🌧 Rain at IORTHO1!', {
        body: 'Rate: ' + rate.toFixed(1) + ' mm/hr · Total: ' + total.toFixed(1) + ' mm'
      });
    }
  }

  async function requestNotifPermission() {
    var p = await Notification.requestPermission();
    if (p === 'granted') {
      document.getElementById('notifBar').classList.remove('show');
      addLog('Notifications enabled ✓', false);
    }
  }

  async function checkNow() {
    await fetchAll();
    if (isRunning) startCountdown();
  }

  function toggleMonitor() {
    var btn = document.getElementById('startBtn');
    if (!isRunning) {
      isRunning = true;
      btn.textContent = '⏹ Stop Monitoring';
      fetchAll();
      startCountdown();
      monitorInterval = setInterval(function() {
        fetchAll();
        startCountdown();
      }, CHECK_INTERVAL);
    } else {
      isRunning = false;
      clearInterval(monitorInterval);
      clearInterval(countdown);
      btn.textContent = '▶ Start Monitoring';
      document.getElementById('nextCheck').textContent = '';
      setStatus('', 'Monitoring stopped');
    }
  }
</script>
</body>
</html>
